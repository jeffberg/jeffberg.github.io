<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>not here</title>
<style>
  html, body {
    margin: 0;
    min-height: 100%;
    background: #f4efe6;
    color: #1a1614;
    font-family: "Cormorant Garamond", "EB Garamond", Garamond, "Hoefler Text", "Times New Roman", serif;
  }
  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    min-height: 100svh;
    padding: 2rem;
    text-align: center;
  }
  p {
    font-style: italic;
    font-size: clamp(1.4rem, 3vw, 2rem);
    margin: 0 0 1.2rem;
    line-height: 1.4;
    max-width: 24ch;
  }
  a {
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: #5a4f48;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
  }
  a:hover {
    color: #3f362f;
  }
  a:focus-visible {
    outline: 2px solid #1a1614;
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <div>
    <p>nothing lives at this address.</p>
    <a href="/">go home</a>
  </div>
</body>
</html>
